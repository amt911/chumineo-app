name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sobrebox
          POSTGRES_PASSWORD: sobrebox
          POSTGRES_DB: sobrebox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sobrebox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      # Mailpit is the SMTP sink the e2e register flow sends the verification
      # email to (matches dev). Without it, /auth/register fails with
      # ECONNREFUSED on the SMTP port.
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test:cov
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - run: pnpm test:e2e
