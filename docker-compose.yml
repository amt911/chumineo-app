services:
  sobrebox-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_HOST_PORT}:5432'
    volumes:
      - sobrebox_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  sobrebox-redis:
    image: redis:7
    ports:
      - '${REDIS_HOST_PORT}:6379'

  sobrebox-mailpit:
    image: axllent/mailpit:latest
    ports:
      - '${MAILPIT_SMTP_PORT}:1025'
      - '${MAILPIT_UI_PORT}:8025'

  sobrebox-rustfs:
    image: rustfs/rustfs
    container_name: sobrebox-rustfs
    ports:
      - '${RUSTFS_S3_PORT}:9000'
      - '${RUSTFS_CONSOLE_PORT}:9001'
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
      RUSTFS_VOLUMES: /data
    volumes:
      - sobrebox_rustfs_data:/data

  # Local full-docker dev (hot reload). Coolify prod does NOT use this compose —
  # it builds the `prod` Dockerfile targets as separate apps. Inside this network
  # db/redis are reached by service name, overriding the host-oriented .env.
  sobrebox-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    depends_on:
      sobrebox-db:
        condition: service_healthy
      sobrebox-redis:
        condition: service_started
    environment:
      NODE_ENV: development
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@sobrebox-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://sobrebox-redis:6379
      MAIL_TRANSPORT: smtp
      MAIL_SMTP_HOST: sobrebox-mailpit
      MAIL_SMTP_PORT: 1025
      # From .env (localhost); inside this network RustFS is reached by service name.
      S3_ENDPOINT: http://sobrebox-rustfs:9000
      # From .env (localhost) or overridden by the tailscale wrapper for mobile.
      CORS_ORIGINS: ${CORS_ORIGINS}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
      # A lockfile change leaves the anon-volume node_modules stale; CI=true lets
      # pnpm auto-purge + reinstall on start instead of aborting on no TTY
      # (ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY).
      CI: 'true'
    ports:
      - '${API_PORT}:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules

  sobrebox-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    depends_on:
      - sobrebox-api
    environment:
      NODE_ENV: development
      WEB_PORT: 3000
      API_INTERNAL_URL: http://sobrebox-api:3000
      API_PROXY_TARGET: http://sobrebox-api:3000
      # Tailnet origins so Next allows the phone's cross-origin dev requests.
      # Empty from .env; set by the tailscale wrapper (dev:docker:tailscale).
      ALLOWED_DEV_ORIGINS: ${ALLOWED_DEV_ORIGINS}
      # See sobrebox-api: CI=true avoids the no-TTY pnpm modules-purge abort when
      # the lockfile changes.
      CI: 'true'
    ports:
      - '${WEB_PORT}:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
      # Isolate Next's build/cache dir from the host bind mount. Sharing it with
      # a host `next dev`/`next build` leaves stale/foreign Turbopack cache that
      # the container's dev server reconciles for 30s+ ("compiling forever").
      # Same reasoning as the node_modules anon volumes above.
      - /app/apps/web/.next

volumes:
  sobrebox_db_data:
  sobrebox_rustfs_data:
